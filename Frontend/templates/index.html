<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sumarizador de avaliações de jogos da Steam usando grafos e PageRank — Projeto EDA2 UnB"
    />
    <title>Steam Reviews — Sumarizador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <!-- Wave background animation -->
    <div id="wave-bg" class="wave">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Container principal que centraliza tudo -->
    <div id="app-container" class="centered">
      <!-- Header / Logo -->
      <header id="header">
        <div class="logo">
          <svg
            class="logo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          <h1>Steam Reviews</h1>
        </div>
        <p class="subtitle">
          Sumarização extrativa de avaliações usando <strong>PageRank</strong>
        </p>
      </header>

      <!-- Barra de pesquisa -->
      <div id="search-wrapper">
        <div class="search-box">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Pesquisar jogo..."
            autocomplete="off"
            spellcheck="false"
          />
          <button
            id="clear-btn"
            class="clear-btn hidden"
            aria-label="Limpar pesquisa"
          >
            ✕
          </button>
        </div>
        <!-- Dropdown de sugestões -->
        <ul id="suggestions" class="suggestions hidden"></ul>
      </div>

      <!-- Área de resultados -->
      <section id="results" class="hidden">
        <div id="game-header">
          <h2 id="game-title"></h2>
          <span id="game-appid" class="badge"></span>
        </div>
        <p id="reviews-count" class="reviews-meta"></p>
        <div id="reviews-list"></div>
      </section>
    </div>

    <footer id="footer">
      <p>Projeto EDA2 - Universidade de Brasília (FGA/UnB) - Grupo 11</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
